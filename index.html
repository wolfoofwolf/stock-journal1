<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockJournal • 私人交易回測日誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;display=swap');
        body { font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif; }
        .finance-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .finance-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .stat-value { font-variant-numeric: tabular-nums; }
        .win-badge { background-color: #dcfce7; color: #166534; padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .loss-badge { background-color: #fee2e2; color: #991b1b; padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    
    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-[200] flex items-center justify-center">
        <div class="w-full max-w-md px-6">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-3xl mb-6 shadow-2xl">
                    <i class="fa-solid fa-lock text-white text-5xl"></i>
                </div>
                <h1 class="text-4xl font-bold tracking-tight">StockJournal</h1>
                <p class="text-slate-400 mt-2">私人交易回測日誌 • 雲端同步</p>
            </div>
            
            <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 shadow-2xl">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-300 mb-2">電子郵件</label>
                        <div class="relative">
                            <i class="fa-solid fa-envelope absolute left-4 top-4 text-slate-500"></i>
                            <input type="email" id="login-email" placeholder="請輸入電子郵件" 
                                   class="w-full pl-12 pr-4 py-3.5 bg-slate-800 border border-slate-600 rounded-2xl text-white focus:outline-none focus:border-blue-500 text-lg">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-slate-300 mb-2">密碼</label>
                        <div class="relative">
                            <i class="fa-solid fa-key absolute left-4 top-4 text-slate-500"></i>
                            <input type="password" id="login-password" placeholder="請輸入密碼" 
                                   class="w-full pl-12 pr-4 py-3.5 bg-slate-800 border border-slate-600 rounded-2xl text-white focus:outline-none focus:border-blue-500 text-lg">
                        </div>
                    </div>
                    
                    <button onclick="loginWithEmail()" 
                            class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold rounded-2xl shadow-xl flex items-center justify-center gap-x-3 active:scale-[0.985] transition-all text-lg">
                        <i class="fa-solid fa-sign-in-alt"></i>
                        <span>登入 StockJournal</span>
                    </button>
                    
                    <div class="text-center text-xs text-slate-500">
                        資料安全儲存在 Google Firebase • 僅限本人存取
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-6 text-xs text-slate-500">
                忘記密碼？請使用 Firebase Console 重設
            </div>
        </div>
    </div>
    
    <!-- Main App -->
    <div id="main-app" class="hidden">
        
        <!-- Navbar -->
        <nav class="bg-slate-900 border-b border-slate-700 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-book text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold">StockJournal</h1>
                        <p class="text-xs text-emerald-400 -mt-1">✓ 已連線 Firebase</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-3">
                    <button onclick="logout()" 
                            class="flex items-center gap-x-2 px-4 py-2 text-sm font-medium text-red-400 hover:text-red-500">
                        <i class="fa-solid fa-sign-out-alt"></i>
                        <span class="hidden sm:inline">登出</span>
                    </button>
                    
                    <button onclick="exportToCSV()" 
                            class="flex items-center gap-x-2 px-5 py-2 bg-white text-slate-900 hover:bg-slate-200 rounded-xl text-sm font-semibold transition-all active:scale-[0.985]">
                        <i class="fa-solid fa-download mr-2"></i>
                        <span>匯出 CSV</span>
                    </button>
                </div>
            </div>
        </nav>
        
        <!-- Warning Banner -->
        <div class="bg-emerald-900/30 border-b border-emerald-700/50 py-2 text-center text-sm text-emerald-300">
            <i class="fa-solid fa-cloud mr-2"></i>
            <span>資料已自動同步至 Google 雲端 • 隨時隨地可存取</span>
        </div>
        
        <div class="max-w-7xl mx-auto px-6 py-8">
            
            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="finance-card bg-slate-900 border border-slate-700 rounded-3xl p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm text-slate-400">總交易筆數</p>
                            <div id="total-trades" class="text-5xl font-bold mt-1">0</div>
                        </div>
                        <i class="fa-solid fa-exchange-alt text-3xl text-blue-500"></i>
                    </div>
                </div>
                
                <div class="finance-card bg-slate-900 border border-slate-700 rounded-3xl p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm text-slate-400">勝率</p>
                            <div class="flex items-baseline">
                                <div id="win-rate" class="text-5xl font-bold mt-1">0</div>
                                <span class="text-2xl text-slate-400 ml-1">%</span>
                            </div>
                        </div>
                        <i class="fa-solid fa-trophy text-3xl text-emerald-500"></i>
                    </div>
                    <div class="mt-3 h-2 bg-slate-700 rounded-full">
                        <div id="win-rate-bar" class="h-2 bg-emerald-500 rounded-full transition-all" style="width:0%"></div>
                    </div>
                </div>
                
                <div class="finance-card bg-slate-900 border border-slate-700 rounded-3xl p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm text-slate-400">總持倉金額</p>
                            <div class="flex items-baseline mt-1">
                                <div id="total-position" class="text-4xl font-bold">0</div>
                                <span class="text-xl text-slate-400 ml-1">元</span>
                            </div>
                        </div>
                        <i class="fa-solid fa-wallet text-3xl text-amber-500"></i>
                    </div>
                </div>
                
                <div class="finance-card bg-slate-900 border border-slate-700 rounded-3xl p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm text-slate-400">表現分數</p>
                            <div class="flex items-baseline mt-1">
                                <div id="performance-score" class="text-5xl font-bold">50</div>
                                <span class="text-xl text-slate-400 ml-1">/100</span>
                            </div>
                        </div>
                        <i class="fa-solid fa-chart-line text-3xl text-purple-500"></i>
                    </div>
                    <div class="mt-3 h-2.5 bg-slate-700 rounded-full">
                        <div id="score-bar" class="h-2.5 bg-gradient-to-r from-purple-500 to-violet-500 rounded-full" style="width:50%"></div>
                    </div>
                </div>
            </div>
            
            <!-- Input Form -->
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
                <div class="lg:col-span-2">
                    <div class="finance-card bg-slate-900 border border-slate-700 rounded-3xl p-6">
                        <h3 class="text-xl font-bold mb-5 flex items-center gap-x-2">
                            <i class="fa-solid fa-plus-circle text-blue-500"></i>
                            <span>新增交易記錄</span>
                        </h3>
                        
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-sm text-slate-400 block mb-1">股票代碼</label>
                                    <input type="text" id="stock-symbol" placeholder="2330" class="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-2xl text-lg font-mono">
                                </div>
                                <div>
                                    <label class="text-sm text-slate-400 block mb-1">交易日期</label>
                                    <input type="date" id="trade-date" class="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-2xl">
                                </div>
                            </div>
                            
                            <div>
                                <label class="text-sm text-slate-400 block mb-1">持倉金額（元）</label>
                                <input type="number" id="position-amount" placeholder="50000" class="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-2xl text-lg font-semibold">
                            </div>
                            
                            <div>
                                <label class="text-sm text-slate-400 block mb-2">交易結果</label>
                                <div class="flex gap-3">
                                    <label onclick="selectOutcome('win')" id="outcome-win"
                                           class="flex-1 flex justify-center items-center gap-x-2 px-5 py-3 border-2 border-emerald-700 rounded-2xl cursor-pointer">
                                        <i class="fa-solid fa-check-circle text-emerald-500"></i>
                                        <span class="font-semibold">成功</span>
                                    </label>
                                    <label onclick="selectOutcome('loss')" id="outcome-loss"
                                           class="flex-1 flex justify-center items-center gap-x-2 px-5 py-3 border-2 border-red-700 rounded-2xl cursor-pointer">
                                        <i class="fa-solid fa-times-circle text-red-500"></i>
                                        <span class="font-semibold">失敗</span>
                                    </label>
                                </div>
                            </div>
                            
                            <div>
                                <label id="reason-label" class="text-sm text-slate-400 block mb-1">成功原因</label>
                                <textarea id="trade-reason" rows="3" placeholder="例如：突破月線..." class="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-2xl"></textarea>
                            </div>
                            
                            <button onclick="addTrade()" 
                                    class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold rounded-2xl flex items-center justify-center gap-x-2">
                                <i class="fa-solid fa-save"></i>
                                <span>儲存到雲端</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- History Table -->
                <div class="lg:col-span-3">
                    <div class="finance-card bg-slate-900 border border-slate-700 rounded-3xl p-6 h-full">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xl font-bold">交易歷史</h3>
                            <span id="history-count" class="text-xs bg-slate-700 px-3 py-1 rounded-full">0 筆</span>
                        </div>
                        
                        <div class="overflow-auto max-h-[480px]">
                            <table class="w-full text-sm">
                                <thead>
                                    <tr class="text-slate-400 text-xs border-b border-slate-700">
                                        <th class="text-left py-3 px-4">日期</th>
                                        <th class="text-left py-3 px-4">股票</th>
                                        <th class="text-right py-3 px-4">金額</th>
                                        <th class="text-center py-3 px-4">結果</th>
                                        <th class="text-left py-3 px-4">原因</th>
                                        <th class="w-10"></th>
                                    </tr>
                                </thead>
                                <tbody id="trade-table-body" class="divide-y divide-slate-700"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
    
    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyDDnshwF7GCGPLupghUMcIdNSGLwraeVXs",
            authDomain: "stock-6a498.firebaseapp.com",
            projectId: "stock-6a498",
            storageBucket: "stock-6a498.firebasestorage.app",
            messagingSenderId: "1011895872994",
            appId: "1:1011895872994:web:fc29c5f69d47f0871dbb",
            measurementId: "G-X0QPVWWPX1"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUser = null;
        let trades = [];
        
        // ==================== AUTH ====================
        function loginWithEmail() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    currentUser = userCredential.user;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('main-app').classList.add('block');
                    loadTradesFromFirestore();
                })
                .catch((error) => {
                    alert('登入失敗：' + error.message);
                });
        }
        
        function logout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }
        
        // ==================== FIRESTORE ====================
        async function loadTradesFromFirestore() {
            if (!currentUser) return;
            
            const snapshot = await db.collection('users').doc(currentUser.uid).collection('trades').orderBy('date', 'desc').get();
            trades = [];
            snapshot.forEach(doc => {
                trades.push({ id: doc.id, ...doc.data() });
            });
            
            renderTrades();
            updateStats();
        }
        
        async function addTradeToFirestore(tradeData) {
            if (!currentUser) return;
            
            await db.collection('users').doc(currentUser.uid).collection('trades').add(tradeData);
            await loadTradesFromFirestore(); // refresh
        }
        
        async function deleteTradeFromFirestore(id) {
            if (!currentUser) return;
            
            await db.collection('users').doc(currentUser.uid).collection('trades').doc(id).delete();
            await loadTradesFromFirestore();
        }
        
        // ==================== UI FUNCTIONS ====================
        function selectOutcome(type) {
            const winLabel = document.getElementById('outcome-win');
            const lossLabel = document.getElementById('outcome-loss');
            const reasonLabel = document.getElementById('reason-label');
            
            if (type === 'win') {
                winLabel.classList.add('!border-emerald-500', 'bg-emerald-900/30');
                lossLabel.classList.remove('!border-red-500', 'bg-red-900/30');
                reasonLabel.innerHTML = '成功原因';
            } else {
                lossLabel.classList.add('!border-red-500', 'bg-red-900/30');
                winLabel.classList.remove('!border-emerald-500', 'bg-emerald-900/30');
                reasonLabel.innerHTML = '失敗原因';
            }
        }
        
        async function addTrade() {
            const symbol = document.getElementById('stock-symbol').value.trim().toUpperCase();
            const date = document.getElementById('trade-date').value;
            const amount = parseFloat(document.getElementById('position-amount').value);
            const outcome = document.querySelector('#outcome-win').classList.contains('!border-emerald-500') ? 'win' : 'loss';
            const reason = document.getElementById('trade-reason').value.trim();
            
            if (!symbol || !date || !amount) {
                alert('請填寫完整資料');
                return;
            }
            
            const tradeData = {
                date: date,
                symbol: symbol,
                amount: amount,
                outcome: outcome,
                reason: reason || '未填寫',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            await addTradeToFirestore(tradeData);
            
            // Clear form
            document.getElementById('stock-symbol').value = '';
            document.getElementById('position-amount').value = '';
            document.getElementById('trade-reason').value = '';
            
            showToast('✅ 已成功儲存到雲端！');
        }
        
        function renderTrades() {
            const tbody = document.getElementById('trade-table-body');
            const countEl = document.getElementById('history-count');
            
            tbody.innerHTML = '';
            countEl.textContent = `${trades.length} 筆`;
            
            trades.forEach(trade => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-slate-800';
                
                const dateStr = trade.date ? new Date(trade.date).toLocaleDateString('zh-TW') : '';
                const amountStr = trade.amount ? trade.amount.toLocaleString() : '0';
                const outcomeHTML = trade.outcome === 'win' 
                    ? `<span class="win-badge">成功</span>` 
                    : `<span class="loss-badge">失敗</span>`;
                
                row.innerHTML = `
                    <td class="px-4 py-3 text-xs text-slate-400">${dateStr}</td>
                    <td class="px-4 py-3 font-mono text-blue-400">${trade.symbol}</td>
                    <td class="px-4 py-3 text-right font-semibold">${amountStr}</td>
                    <td class="px-4 py-3 text-center">${outcomeHTML}</td>
                    <td class="px-4 py-3 text-xs text-slate-300 max-w-[180px] truncate">${trade.reason}</td>
                    <td class="px-2 py-3">
                        <button onclick="deleteTrade('${trade.id}')" class="text-red-400 hover:text-red-600 p-1">
                            <i class="fa-solid fa-trash text-sm"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function deleteTrade(id) {
            if (!confirm('確定要刪除這筆記錄嗎？')) return;
            deleteTradeFromFirestore(id);
        }
        
        function updateStats() {
            const total = trades.length;
            const wins = trades.filter(t => t.outcome === 'win').length;
            const winRate = total > 0 ? Math.round((wins / total) * 100) : 0;
            const totalAmount = trades.reduce((sum, t) => sum + (t.amount || 0), 0);
            
            let score = 50 + (wins * 5) - ((total - wins) * 3);
            score = Math.max(0, Math.min(100, score));
            
            document.getElementById('total-trades').textContent = total;
            document.getElementById('win-rate').textContent = winRate;
            document.getElementById('win-rate-bar').style.width = winRate + '%';
            document.getElementById('total-position').textContent = totalAmount.toLocaleString();
            document.getElementById('performance-score').textContent = score;
            document.getElementById('score-bar').style.width = score + '%';
        }
        
        function exportToCSV() {
            if (trades.length === 0) {
                alert('目前沒有交易記錄');
                return;
            }
            
            let csv = '日期,股票代碼,持倉金額,結果,原因\n';
            trades.forEach(t => {
                csv += `${t.date},${t.symbol},${t.amount},${t.outcome === 'win' ? '成功' : '失敗'},"${t.reason}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `StockJournal_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-x-3 z-[300]';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        // Auto login check
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('block');
                loadTradesFromFirestore();
            }
        });
        
        // Set default date
        window.onload = function() {
            const dateInput = document.getElementById('trade-date');
            if (dateInput) dateInput.value = new Date().toISOString().split('T')[0];
            
            // Default select win
            setTimeout(() => {
                const winLabel = document.getElementById('outcome-win');
                if (winLabel) winLabel.classList.add('!border-emerald-500', 'bg-emerald-900/30');
            }, 300);
        };
        
        console.log('%c[StockJournal] Firebase 版本已載入 ✅', 'color:#22c55e');
    </script>
</body>
</html>
